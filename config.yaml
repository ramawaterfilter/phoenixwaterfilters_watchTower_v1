# ============================================================================
#  Phoenix Watchtower — site monitor config
#  Edit URLs + checks here. No code changes needed to add/adjust checks.
# ============================================================================

run:
  user_agent: "PhoenixWatchtower/1.0 (+site-monitoring)"
  timeout_seconds: 25
  fail_on_regression: false   # true = make the Action FAIL when a check regresses,
                              # so GitHub's own run-failure notification reaches you (no email creds needed)

# ---- Pages to fetch (your real URLs) ----
pages:
  # ---- US — phoenixwaterfilters.com ----
  us_home:           "https://phoenixwaterfilters.com/"
  us_robots:         "https://phoenixwaterfilters.com/robots.txt"
  us_pdp_gravity:    "https://phoenixwaterfilters.com/products/gravity-water-filter"
  us_pdp_carbon:     "https://phoenixwaterfilters.com/products/carbon-filter-element"
  us_pdp_fluoride:   "https://phoenixwaterfilters.com/products/fluoride-reduction-elements"

  # ---- UK — phoenixwaterfilters.co.uk ----
  uk_home:           "https://phoenixwaterfilters.co.uk/"
  uk_robots:         "https://phoenixwaterfilters.co.uk/robots.txt"
  uk_pdp_gravity:    "https://phoenixwaterfilters.co.uk/products/the-phoenix-gravity-water-filter"
  uk_pdp_kokocarb:   "https://phoenixwaterfilters.co.uk/products/kokocarb-cartridges"
  uk_pdp_postreat:   "https://phoenixwaterfilters.co.uk/products/postreat-fluoride-remover"

  # ---- France — phoenixwaterfilters.fr ----
  fr_home:           "https://phoenixwaterfilters.fr/"
  fr_robots:         "https://phoenixwaterfilters.fr/robots.txt"
  fr_tnc:            "https://phoenixwaterfilters.fr/policies/terms-of-service"
  fr_pdp_gravity:    "https://phoenixwaterfilters.fr/products/the-phoenix-gravity-filtre-a-eau"
  fr_pdp_kokocarb:   "https://phoenixwaterfilters.fr/products/kokocarb-cartouches"
  fr_pdp_postreat:   "https://phoenixwaterfilters.fr/products/cartouche-rechargeable-pour-filtre-a-eau-postreat-fluoride-remover"
  fr_en_dup_slug:    "https://phoenixwaterfilters.fr/products/the-phoenix-gravity-water-filter"  # EN duplicate — should 301/404
  fr_typo1:          "https://phoenixwaterfilters.fr/policies/pricvacy-policy"                    # typo URL — should be gone
  fr_typo2:          "https://phoenixwaterfilters.fr/refund-polycy-new"                          # typo URL — should be gone

# ---- Checks (each maps to a tracker task + a market) ----
# types: text_absent | text_present | regex_absent | regex_present | url_status | jsonld_type
checks:
  # ===================== US =====================
  - { id: US-GRAVITY-UP,  market: US, page: us_pdp_gravity,  type: url_status, expect_status: [200], label: "US PDP reachable — Gravity filter", task: US-PDP }
  - { id: US-CARBON-UP,   market: US, page: us_pdp_carbon,    type: url_status, expect_status: [200], label: "US PDP reachable — Carbon element", task: US-PDP }
  - { id: US-FLUOR-UP,    market: US, page: us_pdp_fluoride,  type: url_status, expect_status: [200], label: "US PDP reachable — Fluoride elements", task: US-PDP }
  - { id: US-GRAVITY-SCHEMA, market: US, page: us_pdp_gravity, type: jsonld_type, value: "Product", label: "US Gravity PDP has Product schema", task: US-SCHEMA }
  - { id: US-ADDRESS,     market: US, page: us_home, type: regex_present, pattern: "\\b\\d{5}(?:-\\d{4})?\\b|United States", label: "US address/ZIP present in footer", task: US-LEGAL }

  # ===================== UK =====================
  - { id: UK-GRAVITY-PRICE0,  market: UK, page: uk_pdp_gravity,  type: text_absent, needle: "£0.00", label: "£0.00 price gone — Gravity PDP", task: UK-01 }
  - { id: UK-KOKO-PRICE0,     market: UK, page: uk_pdp_kokocarb, type: text_absent, needle: "£0.00", label: "£0.00 price gone — KokoCarb PDP", task: UK-01 }
  - { id: UK-POST-PRICE0,     market: UK, page: uk_pdp_postreat, type: text_absent, needle: "£0.00", label: "£0.00 price gone — POSTreat PDP", task: UK-01 }
  - { id: UK-GRAVITY-SCHEMA,  market: UK, page: uk_pdp_gravity,  type: jsonld_type, value: "Product", label: "Product schema — Gravity PDP", task: UK-05 }
  - { id: UK-KOKO-SCHEMA,     market: UK, page: uk_pdp_kokocarb, type: jsonld_type, value: "Product", label: "Product schema — KokoCarb PDP", task: UK-05 }
  - { id: UK-TITLE-TYPO,      market: UK, page: uk_home, type: regex_absent, pattern: "Clean & healthy Water", label: "Homepage title typo gone ('healthy' lower-case)", task: UK-08 }
  - { id: UK-SALE-BANNER,     market: UK, page: uk_home, type: text_absent, needle: "Winter Sale", label: "Stale winter-sale banner removed", task: UK-44 }
  - { id: UK-ROBOTS,          market: UK, page: uk_robots, type: url_status, expect_status: [200], label: "robots.txt reachable", task: UK-02 }

  # ===================== France =====================
  - { id: FR-GRAVITY-TRANSNOTE, market: France, page: fr_pdp_gravity,  type: text_absent, needle: "Note du traducteur", label: "Translator's note gone — Gravity PDP", task: FR-16 }
  - { id: FR-KOKO-TRANSNOTE,    market: France, page: fr_pdp_kokocarb, type: text_absent, needle: "Note du traducteur", label: "Translator's note gone — KokoCarb PDP", task: FR-16 }
  - { id: FR-POST-TRANSNOTE,    market: France, page: fr_pdp_postreat, type: text_absent, needle: "Note du traducteur", label: "Translator's note gone — POSTreat PDP", task: FR-16 }
  - { id: FR-EN-LEFTOVER,       market: France, page: fr_pdp_gravity,  type: regex_absent, pattern: "translator|translation note", label: "No English 'translator note' leftover", task: FR-16 }
  - { id: FR-UKPHONE,           market: France, page: fr_home, type: regex_absent, pattern: "\\+44", label: "UK (+44) phone removed from FR site", task: FR-02 }
  - { id: FR-GRAMMAR,           market: France, page: fr_home, type: text_absent, needle: "Aux France", label: "'Aux France' grammar error gone", task: FR-30 }
  - { id: FR-CONSENT,           market: France, page: fr_home, type: regex_present, pattern: "consent|cookie|RGPD|accepter", label: "GDPR/consent banner present", task: FR-03 }
  - { id: FR-GRAVITY-SCHEMA,    market: France, page: fr_pdp_gravity,  type: jsonld_type, value: "Product", label: "Product schema — Gravity PDP", task: FR-31 }
  - { id: FR-KOKO-SCHEMA,       market: France, page: fr_pdp_kokocarb, type: jsonld_type, value: "Product", label: "Product schema — KokoCarb PDP", task: FR-31 }
  - { id: FR-TNC-WITHDRAW,      market: France, page: fr_tnc, type: regex_present, pattern: "rétractation|14 jours", label: "T&Cs include 14-day withdrawal right", task: FR-05 }
  - { id: FR-TNC-SIRET,         market: France, page: fr_tnc, type: regex_present, pattern: "SIRET", label: "T&Cs include SIRET", task: FR-04 }
  - { id: FR-ROBOTS-CART,       market: France, page: fr_robots, type: regex_present, pattern: "Disallow:\\s*/cart", label: "robots.txt disallows /cart", task: FR-33 }
  - { id: FR-EN-DUP-SLUG,       market: France, page: fr_en_dup_slug, type: url_status, expect_status: [301, 302, 404, 410], label: "EN duplicate slug 301/404 (de-indexed)", task: FR-33 }
  - { id: FR-TYPO1,             market: France, page: fr_typo1, type: url_status, expect_status: [301, 302, 404, 410], label: "Typo URL /pricvacy-policy gone", task: FR-33 }
  - { id: FR-TYPO2,             market: France, page: fr_typo2, type: url_status, expect_status: [301, 302, 404, 410], label: "Typo URL /refund-polycy-new gone", task: FR-33 }
