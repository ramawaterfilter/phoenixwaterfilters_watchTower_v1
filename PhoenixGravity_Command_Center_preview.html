@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap');
* { box-sizing: border-box; }
.pg-root { font-family: Inter, system-ui, sans-serif; color: #0F172A; background: #EEF2F8; min-height: 100%; -webkit-font-smoothing: antialiased; position: relative; }
.pg-arc { transition: stroke-dasharray .9s ease; }
@media (prefers-reduced-motion: reduce) { .pg-arc, .pg-ring circle, * { transition: none !important; } }

.pg-head { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;
  background: linear-gradient(120deg,#0B1F38 0%,#10294A 55%,#0E5B57 140%); color: #fff; padding: 18px 26px; }
.pg-head-l { display: flex; flex-direction: column; gap: 3px; }
.pg-mark { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 19px; letter-spacing: .14em; display: flex; align-items: center; gap: 10px; }
.pg-drop { width: 12px; height: 12px; border-radius: 60% 60% 60% 0; transform: rotate(45deg); background: linear-gradient(135deg,#6EE7D2,#2563EB); display: inline-block; }
.pg-sub { font-size: 12px; color: #9DB6D4; letter-spacing: .03em; }
.pg-head-r { display: flex; align-items: center; gap: 10px; }
.pg-asof { font: 600 12px 'JetBrains Mono', monospace; color: #CFE0F2; }
.pg-cad { font-size: 11px; font-weight: 600; color: #6EE7D2; border: 1px solid rgba(110,231,210,.4); padding: 5px 10px; border-radius: 999px; }

.pg-main { max-width: 1180px; margin: 0 auto; padding: 22px 22px 40px; display: flex; flex-direction: column; gap: 22px; }

.pg-toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; align-items: center; gap: 12px;
  background: #fff; border: 1px solid #C4E2D1; border-left: 4px solid #15803D; box-shadow: 0 12px 40px rgba(11,31,56,.18); border-radius: 12px; padding: 12px 18px; font-size: 13.5px; color: #14532D; animation: pop .3s ease; }
.pg-toast b { color: #0B1F38; }
.pg-confetti { font-size: 22px; animation: spin 1s ease; display: inline-block; }
@keyframes pop { from { opacity: 0; transform: translateX(-50%) translateY(-8px) scale(.96); } to { opacity: 1; } }
@keyframes spin { from { transform: rotate(-25deg) scale(.6); } to { transform: rotate(0) scale(1); } }

.pg-hero { display: grid; grid-template-columns: 270px 1fr; gap: 18px; }
.pg-gauge-card { background: #fff; border: 1px solid #E2E8F2; border-radius: 16px; padding: 18px 18px 20px; text-align: center; box-shadow: 0 1px 2px rgba(11,31,56,.04); }
.pg-card-eyebrow { font: 600 10.5px 'JetBrains Mono', monospace; letter-spacing: .12em; text-transform: uppercase; color: #64748B; margin-bottom: 4px; }
.pg-verdict { display: inline-block; font-weight: 700; font-size: 13.5px; padding: 5px 14px; border-radius: 999px; margin-top: 2px; }
.pg-interp { font-size: 12.5px; color: #475569; line-height: 1.5; margin: 12px 2px 0; }
.pg-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.pg-chip { position: relative; background: #fff; border: 1px solid #E2E8F2; border-radius: 14px; padding: 16px 14px 14px; overflow: hidden; box-shadow: 0 1px 2px rgba(11,31,56,.04); }
.pg-chip-v { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px; line-height: 1; color: #0B1F38; }
.pg-chip-l { font-size: 11.5px; color: #64748B; margin-top: 7px; font-weight: 500; }
.pg-chip-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }

.pg-ring { display: block; }

/* leaderboard */
.pg-lead { background: linear-gradient(135deg,#fff 0%,#FAFCFF 100%); border: 1px solid #E2E8F2; border-radius: 16px; padding: 18px 20px; box-shadow: 0 1px 2px rgba(11,31,56,.04); }
.pg-lead-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.pg-lead-head h2 { font-family: 'Space Grotesk', sans-serif; font-size: 17px; color: #0B1F38; margin: 0; }
.pg-lead-sub { font-size: 12px; color: #64748B; }
.pg-lead-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 12px; }
.pg-lead-card { display: grid; grid-template-columns: 34px 1fr 48px; gap: 11px; align-items: center; background: #fff; border: 1px solid #E8EDF4; border-radius: 14px; padding: 13px 14px; transition: transform .15s, box-shadow .15s; }
.pg-lead-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(11,31,56,.08); }
.pg-lead-card.king { border-color: #C8E6D3; background: linear-gradient(135deg,#F2FBF5 0%,#fff 70%); box-shadow: 0 4px 18px rgba(21,128,61,.10); }
.pg-lead-rank { font-size: 24px; text-align: center; }
.pg-lead-num { font: 700 15px 'Space Grotesk', sans-serif; color: #94A3B8; }
.pg-lead-name { font: 700 14.5px 'Space Grotesk', sans-serif; color: #0B1F38; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.pg-crown { font: 700 9px 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: .06em; color: #15803D; background: #E3F4E8; padding: 2px 7px; border-radius: 999px; }
.pg-lead-mkt { font: 600 10.5px 'JetBrains Mono', monospace; color: #94A3B8; margin: 2px 0 7px; }
.pg-lead-bar { height: 6px; background: #EEF2F8; border-radius: 999px; overflow: hidden; }
.pg-lead-bar span { display: block; height: 100%; border-radius: 999px; transition: width .7s ease; }
.pg-lead-stats { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.pg-lead-stats span { font: 600 10.5px 'JetBrains Mono', monospace; background: #F1F5FB; color: #475569; padding: 3px 7px; border-radius: 6px; }
.pg-lead-stats .ok { background: #E3F4E8; color: #15803D; }
.pg-lead-stats .bad { background: #FCE4E4; color: #B91C1C; }

/* matrix */
.pg-matrix { background: #fff; border: 1px solid #E2E8F2; border-radius: 16px; padding: 16px 18px; box-shadow: 0 1px 2px rgba(11,31,56,.04); }
.pg-matrix-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.pg-matrix-head h2 { font-family: 'Space Grotesk', sans-serif; font-size: 15px; color: #0B1F38; margin: 0; }
.pg-matrix-sub { font-size: 12px; color: #64748B; }
.pg-matrix-wrap { overflow-x: auto; }
.pg-mtx { width: 100%; border-collapse: separate; border-spacing: 4px; min-width: 640px; }
.pg-mtx th { font: 600 10px 'JetBrains Mono', monospace; letter-spacing: .03em; color: #64748B; text-align: center; padding: 6px 4px; white-space: nowrap; }
.pg-mtx th.l { text-align: left; }
.pg-mtx-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
.pg-mtx td { text-align: center; border-radius: 9px; padding: 8px 4px; background: #F8FAFD; }
.pg-mtx td.l { background: none; text-align: left; }
.pg-mtx-mk { font: 700 13px 'Space Grotesk', sans-serif; }
.pg-mtx-cell { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.pg-mtx-cell b { font: 700 17px 'Space Grotesk', sans-serif; line-height: 1; }
.pg-mtx-cell small { font: 600 9.5px 'JetBrains Mono', monospace; color: #94A3B8; }
.pg-mtx-dash { color: #CBD5E1; }
.pg-mtx td.tot { font: 700 14px 'Space Grotesk', sans-serif; color: #0B1F38; background: #EEF2F8; }

.pg-tri { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.pg-mcard { background: #fff; border: 1px solid #E2E8F2; border-top: 3px solid; border-radius: 16px; padding: 16px 16px 14px; display: flex; flex-direction: column; gap: 11px; box-shadow: 0 1px 2px rgba(11,31,56,.04); }
.pg-mhead { display: flex; justify-content: space-between; align-items: flex-start; }
.pg-mname { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; }
.pg-mwho { font-size: 11px; color: #64748B; margin-top: 2px; }
.pg-mstats { display: flex; flex-wrap: wrap; gap: 6px; }
.pg-mstats span { font: 600 11px 'JetBrains Mono', monospace; background: #F1F5FB; color: #334155; padding: 4px 8px; border-radius: 7px; }
.pg-mstats .bad { background: #FCE4E4; color: #B91C1C; }
.pg-mdisc { display: flex; flex-wrap: wrap; gap: 5px; }
.pg-mdisc-pill { font: 600 10.5px 'JetBrains Mono', monospace; padding: 3px 8px; border-radius: 999px; }
.pg-mtop { display: flex; flex-direction: column; gap: 5px; min-height: 30px; }
.pg-mtop-ok { font-size: 12px; color: #15803D; }
.pg-mtop-row { display: flex; gap: 8px; align-items: center; font-size: 12px; color: #334155; padding: 3px 4px; border-radius: 6px; }
.pg-mtop-task { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.pg-pri { font: 700 10px 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 5px; color: #fff; }
.pg-pri[data-p="P0"] { background: #B91C1C; } .pg-pri[data-p="P1"] { background: #D97706; }
.pg-pri[data-p="P2"] { background: #2563EB; } .pg-pri[data-p="P3"] { background: #94A3B8; }
.pg-disc { font: 600 10.5px 'JetBrains Mono', monospace; padding: 3px 8px; border-radius: 6px; text-align: center; white-space: nowrap; }

.pg-risk { background: #fff; border: 1px solid #E2E8F2; border-radius: 16px; padding: 16px 18px; box-shadow: 0 1px 2px rgba(11,31,56,.04); }
.pg-risk-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; }
.pg-risk-head h2 { font-family: 'Space Grotesk', sans-serif; font-size: 15px; margin: 0; color: #0B1F38; }
.pg-risk-sub { font: 600 11px 'JetBrains Mono', monospace; color: #B91C1C; }
.pg-risk-list { display: flex; flex-direction: column; }
.pg-risk-row { display: grid; grid-template-columns: 56px 58px 1fr 168px 132px; gap: 10px; align-items: center; padding: 8px 4px; border-top: 1px solid #EEF2F8; font-size: 13px; }
.pg-rid { font: 600 12px 'JetBrains Mono', monospace; color: #0B1F38; }
.pg-rmkt { font: 600 11px 'JetBrains Mono', monospace; text-align: center; padding: 3px 0; border-radius: 6px; }
.pg-rtask { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pg-rowner { font-size: 12px; color: #475569; }
.pg-rflag { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 600; padding: 4px 9px; border-radius: 999px; justify-self: start; }
.pg-rflag i, .pg-flagpill i { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

.pg-table-wrap { background: #fff; border: 1px solid #E2E8F2; border-radius: 16px; padding: 16px 16px 10px; box-shadow: 0 1px 2px rgba(11,31,56,.04); }
.pg-controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; }
.pg-mkt-chips { display: flex; gap: 6px; }
.pg-chipbtn { font: 600 12.5px Inter; padding: 7px 14px; border-radius: 999px; border: 1px solid #D9E1EE; background: #fff; color: #334155; cursor: pointer; }
.pg-chipbtn.on { background: #0B1F38; border-color: #0B1F38; color: #fff; }
.pg-search-wrap { display: flex; gap: 8px; align-items: center; }
.pg-search { font: 400 13px Inter; padding: 8px 12px; border: 1px solid #D9E1EE; border-radius: 9px; width: 180px; }
.pg-flagtog { font: 600 12px Inter; padding: 8px 12px; border-radius: 9px; border: 1px solid #D9E1EE; background: #fff; color: #64748B; cursor: pointer; }
.pg-flagtog.on { background: #FEF3C7; border-color: #F2C94C; color: #B45309; }
.pg-disc-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 12px; }
.pg-disc-lbl { font: 600 10px 'JetBrains Mono', monospace; letter-spacing: .05em; text-transform: uppercase; color: #94A3B8; margin-right: 2px; }
.pg-dchip { font: 600 12px Inter; padding: 6px 12px; border-radius: 999px; border: 1px solid #D9E1EE; background: #fff; cursor: pointer; }
.pg-dchip.on { font-weight: 700; }
.pg-selects { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
.pg-selects label { font: 600 10px 'JetBrains Mono', monospace; letter-spacing: .04em; text-transform: uppercase; color: #94A3B8; display: flex; flex-direction: column; gap: 3px; }
.pg-selects select { font: 500 13px Inter; padding: 6px 8px; border: 1px solid #D9E1EE; border-radius: 9px; background: #fff; color: #1E293B; }
.pg-count { font: 600 11px 'JetBrains Mono', monospace; color: #94A3B8; margin: 12px 2px 6px; }

.pg-table { display: flex; flex-direction: column; }
.pg-tr { display: grid; grid-template-columns: 30px 60px 64px 1fr 88px 42px 116px 120px 42px; gap: 10px; align-items: center; padding: 9px 6px; border-top: 1px solid #EEF2F8; font-size: 13px; cursor: pointer; }
.pg-th { border-top: none; cursor: default; }
.pg-th span { font: 600 10px 'JetBrains Mono', monospace; letter-spacing: .05em; text-transform: uppercase; color: #94A3B8; }
.pg-rowgroup:hover .pg-tr { background: #F7FAFE; }
.pg-rowgroup.open .pg-tr { background: #F1F5FB; }
.c-flag { display: flex; justify-content: center; }
.star { background: none; border: none; cursor: pointer; font-size: 15px; color: #D2DAE6; padding: 0; line-height: 1; }
.star.on { color: #F2C94C; }
.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.c-id { color: #0B1F38; font-weight: 600; }
.c-task { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #1E293B; }
.c-own { font-size: 12px; color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.c-own em { color: #94A3B8; font-style: normal; }
.pg-mkpill { font: 600 11px 'JetBrains Mono', monospace; padding: 3px 8px; border-radius: 6px; }
.pg-flagpill { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 999px; white-space: nowrap; }
.pg-rowpct { display: flex; justify-content: center; }

.pg-detail { padding: 4px 8px 16px 40px; background: #F7FAFE; border-top: 1px solid #EEF2F8; }
.pg-d-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 26px; padding-top: 12px; }
.pg-d-grid label { font: 600 9.5px 'JetBrains Mono', monospace; letter-spacing: .06em; text-transform: uppercase; color: #94A3B8; display: block; margin-bottom: 3px; }
.pg-d-grid p { margin: 0; font-size: 13px; color: #334155; line-height: 1.45; }

.pg-editor { margin-top: 14px; background: #fff; border: 1px solid #E2E8F2; border-radius: 12px; padding: 13px 14px; }
.pg-edit-tag { font: 700 10px 'JetBrains Mono', monospace; letter-spacing: .08em; text-transform: uppercase; color: #2563EB; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.pg-upd { font-weight: 500; color: #94A3B8; text-transform: none; letter-spacing: 0; }
.pg-edit-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.pg-fld { display: flex; flex-direction: column; gap: 4px; font: 600 9.5px 'JetBrains Mono', monospace; letter-spacing: .05em; text-transform: uppercase; color: #94A3B8; }
.pg-fld select, .pg-fld input, .pg-fld textarea { font: 500 13px Inter; padding: 7px 9px; border: 1px solid #D9E1EE; border-radius: 8px; background: #fff; color: #1E293B; text-transform: none; letter-spacing: 0; }
.pg-fld-pct input { width: 84px; }
.pg-fld-rem { margin-top: 11px; }
.pg-fld-rem textarea { width: 100%; resize: vertical; font-family: Inter; }
.pg-done-btn { font: 600 12.5px Inter; padding: 8px 14px; border-radius: 8px; border: 1px solid #C4E2D1; background: #E3F4E8; color: #15803D; cursor: pointer; transition: all .15s; }
.pg-done-btn:hover { background: #15803D; color: #fff; border-color: #15803D; }

.pg-empty { padding: 26px; text-align: center; color: #94A3B8; font-size: 13px; }

.pg-foot { max-width: 1180px; margin: 0 auto; padding: 4px 22px 34px; display: flex; flex-direction: column; gap: 4px; }
.pg-foot span { font-size: 12px; color: #64748B; }
.pg-foot b { color: #334155; }
.pg-foot-note { color: #94A3B8; }

:focus-visible { outline: 2px solid #2563EB; outline-offset: 2px; border-radius: 6px; }

@media (max-width: 900px) {
  .pg-hero { grid-template-columns: 1fr; }
  .pg-kpis { grid-template-columns: repeat(3, 1fr); }
  .pg-tri { grid-template-columns: 1fr; }
  .pg-risk-row { grid-template-columns: 52px 52px 1fr; }
  .pg-rowner, .pg-rflag { display: none; }
  .pg-tr { grid-template-columns: 26px 52px 1fr 80px 40px 104px; }
  .pg-tr .c-mkt, .pg-mkpill, .c-own, .pg-rowpct { display: none; }
  .pg-th span:nth-child(3), .pg-th span:nth-child(7), .pg-th span:nth-child(9) { display: none; }
  .pg-d-grid { grid-template-columns: 1fr; }

.cc-app { font-family: Inter, system-ui, sans-serif; background:#EEF2F8; min-height:100%; }
.cc-top { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  background:#fff; border-bottom:1px solid #E2E8F0; padding:11px 22px; position:sticky; top:0; z-index:40; }
.cc-brand { display:flex; align-items:center; gap:14px; }
.cc-logo { height:52px; width:auto; display:block; }
.cc-brand-s { font:600 12px Inter, sans-serif; color:#475569; letter-spacing:.02em; line-height:1.4; }
.cc-brand-s b { color:#0B1F38; font-weight:700; }
.cc-tabs { display:flex; gap:8px; }
.cc-tab { font:600 13px Inter, sans-serif; padding:9px 17px; border-radius:10px; border:1px solid #E2E8F0; background:#fff; color:#334155; cursor:pointer; transition:all .15s; }
.cc-tab:hover { border-color:#CBD5E1; }
.cc-tab.on { background:#0B1F38; color:#fff; border-color:#0B1F38; }
.cc-foot { text-align:center; font:500 12px Inter, sans-serif; color:#64748B; padding:18px 16px; background:#EEF2F8; border-top:1px solid #E2E8F0; }
.cc-foot b { color:#0B1F38; }
/* watchtower */
.wt-status { color:#fff; font:700 12px 'Space Grotesk', sans-serif; padding:5px 13px; border-radius:999px; }
.wt-statusbar { display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap;
  background:#fff; border:1px solid #E5E9F0; border-radius:14px; padding:14px 18px; margin-bottom:14px; }
.wt-sb-lab { font:700 11px Inter, sans-serif; text-transform:uppercase; letter-spacing:.08em; color:#6B7280; }
.wt-sb-badge { font:700 23px 'Space Grotesk', sans-serif; margin-top:3px; }
.wt-sb-sub { font:600 12px 'JetBrains Mono', monospace; color:#475569; margin-top:4px; }
.wt-sb-r { font:500 12px Inter, sans-serif; color:#94A3B8; text-align:right; line-height:1.5; }
.wt-health { font:700 42px 'Space Grotesk', sans-serif; line-height:1; }
.wt-health span { font-size:18px; color:#9ca3af; }
.wt-mlist { margin-top:8px; }
.wt-mrow { display:flex; gap:8px; font:500 12.5px Inter, sans-serif; padding:6px 0; border-top:1px dashed #E5E9F0; line-height:1.35; }
.wt-dot { flex:none; width:7px; height:7px; border-radius:50%; margin-top:5px; }
.wt-tk { color:#9ca3af; font:600 10.5px 'JetBrains Mono', monospace; }
.wt-table { background:#fff; border:1px solid #E5E9F0; border-radius:12px; overflow:hidden; }
.wt-tr { display:grid; grid-template-columns:74px 1fr 84px 116px; gap:10px; padding:9px 14px; border-top:1px solid #EEF1F6; align-items:start; }
.wt-th { background:#F8FAFC; border-top:none; font:700 11px Inter, sans-serif; color:#6B7280; text-transform:uppercase; letter-spacing:.05em; }
.wt-mtag { font:700 12px Inter, sans-serif; }
.wt-clab { font:500 13px Inter, sans-serif; color:#0F172A; }
.wt-det { color:#6B7280; font:500 11px 'JetBrains Mono', monospace; margin-top:2px; }
.wt-badge { color:#fff; border-radius:5px; padding:2px 8px; font:700 11px 'JetBrains Mono', monospace; white-space:nowrap; }
